name = "livestore-cf-bench"
main = "./src/worker.ts"
compatibility_date = "2025-05-07"
compatibility_flags = ["enable_request_signal"]

[[durable_objects.bindings]]
name = "SYNC_BACKEND_DO"
class_name = "SyncBackendDO"

[[durable_objects.bindings]]
name = "BENCH_STORE_DO"
class_name = "BenchStoreDo"

[[migrations]]
tag = "v1"
new_sqlite_classes = ["SyncBackendDO", "BenchStoreDo"]
