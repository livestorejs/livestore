agents:
  os: "nixos"
  nix: "true"
env:
  GRAFANA_ENDPOINT: "https://livestore.grafana.net"
  OTEL_EXPORTER_OTLP_ENDPOINT: "https://otlp-gateway-prod-us-east-2.grafana.net/otlp"
  VITE_OTEL_EXPORTER_OTLP_ENDPOINT: ""

steps:
  - label: ":lint: lint"
    key: lint
    env:
      LIVESTORE_BRANCH_PROTECTION_REQUIRED: "true"
    commands:
      - direnv allow .
      - direnv exec . mono lint

  - label: ":test_tube: unit tests"
    key: test-unit
    env:
      LIVESTORE_BRANCH_PROTECTION_REQUIRED: "true"
    commands:
      - direnv allow .
      - direnv exec . mono test unit

  - label: ":arrows_counterclockwise: integration (node-sync)"
    key: test-integration-node-sync
    env:
      LIVESTORE_BRANCH_PROTECTION_REQUIRED: "true"
    commands:
      - direnv allow .
      - |
        direnv exec . bash -lc '
          set -euo pipefail

          OTEL_EXPORTER_OTLP_HEADERS="Authorization=Basic $(printf "%s:%s" "$GRAFANA_CLOUD_OTLP_INSTANCE_ID" "$GRAFANA_CLOUD_OTLP_API_KEY" | base64 | tr -d "\n")"
          export OTEL_EXPORTER_OTLP_HEADERS

          if mono test integration node-sync; then
            :
          else
            buildkite-agent annotate --style "warning" "Node-sync integration tests failed (flaky; see https://github.com/livestorejs/livestore/issues/624)"
          fi
        '
      - buildkite-agent artifact upload "tests/integration/tmp/logs/*.log" || true

  - label: ":satellite: integration (sync-provider ${provider})"
    key: test-integration-sync-provider
    env:
      LIVESTORE_BRANCH_PROTECTION_REQUIRED: "true"
    matrix:
      setup:
        provider:
          - mock
          - electric
          - s2
          - cf-http-d1
          - cf-http-do
          - cf-ws-d1
          - cf-ws-do
          - cf-do-rpc-d1
          - cf-do-rpc-do
    commands:
      - direnv allow .
      - |
        direnv exec . bash -lc '
          set -euo pipefail

          OTEL_EXPORTER_OTLP_HEADERS="Authorization=Basic $(printf "%s:%s" "$GRAFANA_CLOUD_OTLP_INSTANCE_ID" "$GRAFANA_CLOUD_OTLP_API_KEY" | base64 | tr -d "\n")"
          export OTEL_EXPORTER_OTLP_HEADERS

          if [ "${provider}" = "s2" ] && [ -z "${S2_ACCESS_TOKEN:-}" ]; then
            echo "Skipping S2 sync-provider tests: S2_ACCESS_TOKEN not set"
            exit 0
          fi

          mono test integration sync-provider --provider "${provider}"
        '

  - label: ":globe_with_meridians: integration (playwright ${suite})"
    key: test-integration-playwright
    env:
      LIVESTORE_BRANCH_PROTECTION_REQUIRED: "true"
    matrix:
      setup:
        suite:
          - misc
          - todomvc
          - devtools
    commands:
      - direnv allow .
      - |
        direnv exec . bash -lc '
          set -euo pipefail

          OTEL_EXPORTER_OTLP_HEADERS="Authorization=Basic $(printf "%s:%s" "$GRAFANA_CLOUD_OTLP_INSTANCE_ID" "$GRAFANA_CLOUD_OTLP_API_KEY" | base64 | tr -d "\n")"
          export OTEL_EXPORTER_OTLP_HEADERS

          export PLAYWRIGHT_SUITE="${suite}"

          if [ "${suite}" = "devtools" ]; then
            mono test integration devtools || buildkite-agent annotate --style "warning" "Devtools Playwright suite failed but marked flaky"
          else
            mono test integration "${suite}"
          fi
        '
      - buildkite-agent artifact upload "tests/integration/playwright-report/**/*" || true
      - |
        if [ -n "${NETLIFY_AUTH_TOKEN:-}" ]; then
          direnv exec . bash -lc '
            set -euo pipefail
            export PLAYWRIGHT_SUITE="${suite}"
            bunx netlify-cli deploy --no-build --dir=tests/integration/playwright-report --site livestore-ci --filter @local/tests-integration --alias "${suite}-$(git rev-parse --short HEAD)"
          '
        else
          echo "Skipping Netlify deploy: NETLIFY_AUTH_TOKEN not set"
        fi

  - label: ":chart_with_upwards_trend: perf tests"
    key: perf-test
    env:
      LIVESTORE_BRANCH_PROTECTION_REQUIRED: "true"
    commands:
      - direnv allow .
      - |
        direnv exec . bash -lc '
          set -euo pipefail

          OTEL_EXPORTER_OTLP_HEADERS="Authorization=Basic $(printf "%s:%s" "$GRAFANA_CLOUD_OTLP_INSTANCE_ID" "$GRAFANA_CLOUD_OTLP_API_KEY" | base64 | tr -d "\n")"
          export OTEL_EXPORTER_OTLP_HEADERS
          export COMMIT_SHA="${BUILDKITE_COMMIT}"

          mono test perf
        '

  - label: ":floppy_disk: wa-sqlite"
    key: wa-sqlite-test
    env:
      LIVESTORE_BRANCH_PROTECTION_REQUIRED: "true"
    commands:
      - direnv allow .
      - |
        direnv exec . bash -lc '
          set -euo pipefail

          OTEL_EXPORTER_OTLP_HEADERS="Authorization=Basic $(printf "%s:%s" "$GRAFANA_CLOUD_OTLP_INSTANCE_ID" "$GRAFANA_CLOUD_OTLP_API_KEY" | base64 | tr -d "\n")"
          export OTEL_EXPORTER_OTLP_HEADERS
          export COMMIT_SHA="${BUILDKITE_COMMIT}"

          (cd packages/@livestore/wa-sqlite && nix run .#build)
          mono test integration wa-sqlite
        '

  - wait

  - label: ":package: publish snapshot"
    key: publish-snapshot-version
    if: build.pull_request.id == null
    commands:
      - direnv allow .
      - direnv exec . bash -lc 'set -euo pipefail; echo "//registry.npmjs.org/:_authToken=${NPM_TOKEN}" >> ~/.npmrc'
      - direnv exec . mono release snapshot --git-sha="${BUILDKITE_COMMIT}"

  - label: ":building_construction: examples build/test/deploy"
    key: build-and-deploy-examples-src
    commands:
      - direnv allow .
      - direnv exec . pnpm --filter "livestore-example-*" --workspace-concurrency=1 build
      - direnv exec . mono examples test
      - |
        if [ -n "${CLOUDFLARE_API_TOKEN:-}" ] && [ -n "${CLOUDFLARE_ACCOUNT_ID:-}" ] && [ "${BUILDKITE_PULL_REQUEST:-false}" = "false" ]; then
          direnv exec . mono examples deploy
        else
          echo "Skipping Cloudflare deploy (PR build or missing CLOUDFLARE credentials)"
        fi

  - label: ":memo: docs build/deploy"
    key: build-deploy-docs
    commands:
      - direnv allow .
      - direnv exec . mono docs build --api-docs
      - |
        if [ "${BUILDKITE_PULL_REQUEST:-false}" = "false" ] && [ -n "${NETLIFY_AUTH_TOKEN:-}" ]; then
          direnv exec . mono docs deploy
        elif [ "${BUILDKITE_PULL_REQUEST:-false}" != "false" ] && [ -n "${NETLIFY_AUTH_TOKEN:-}" ]; then
          direnv exec . mono docs deploy
        else
          echo "Skipping docs deploy: NETLIFY_AUTH_TOKEN not set"
        fi

  - label: ":factory: example create/build (${app})"
    key: build-example-create
    if: build.pull_request.id == null
    matrix:
      setup:
        app:
          - web-todomvc
          - web-linearlite
          - expo-linearlite
    env:
      SNAPSHOT_VERSION: "0.0.0-snapshot-${BUILDKITE_COMMIT}"
    commands:
      - direnv allow .
      - |
        direnv exec . bash -lc '
          set -euo pipefail

          APP_PATH="examples/${app}"

          WORKSPACE_DEPS=$(cd "${APP_PATH}" && pnpm list --only-projects --json | jq -r ".[0].dependencies | keys | join(\" \")")
          export WORKSPACE_DEPS

          pnpm dlx @livestore/cli@"${SNAPSHOT_VERSION}" create --example "${app}" --branch "${BUILDKITE_BRANCH}" "${BUILDKITE_BUILD_CHECKOUT_PATH}/${APP_PATH}.tmp"

          pnpm config set fetchRetries 3

          cd "${BUILDKITE_BUILD_CHECKOUT_PATH}/${APP_PATH}.tmp"
          if [ -n "${WORKSPACE_DEPS}" ]; then
            pnpm add $(for dep in $WORKSPACE_DEPS; do echo "$dep@${SNAPSHOT_VERSION}"; done)
          fi

          if [ "${app}" != "expo-linearlite" ]; then
            pnpm build
          fi
        '
