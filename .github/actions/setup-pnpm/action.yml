name: Setup pnpm workspace
description: Install Node.js, pnpm, workspace dependencies, and optional Playwright browsers.

inputs:
  playwright:
    description: Install Chromium and OS dependencies through Playwright.
    required: false
    default: 'false'

runs:
  using: composite
  steps:
    - name: Setup pnpm
      uses: pnpm/action-setup@v4
      with:
        version: 11.3.0
        run_install: false

    - name: Setup Node.js
      uses: actions/setup-node@v6
      with:
        node-version: '24'
        cache: pnpm

    - name: Install dependencies
      shell: bash
      run: pnpm install --frozen-lockfile --config.confirmModulesPurge=false

    - name: Install Playwright Chromium
      if: ${{ inputs.playwright == 'true' }}
      shell: bash
      run: pnpm --dir tests/integration exec playwright install --with-deps chromium
