          pnpm add --allow-build=@mixedbread/cli --allow-build=@myobie/pty --allow-build=@parcel/watcher --allow-build=cbor-extract --allow-build=dtrace-provider --allow-build=esbuild --allow-build=msgpackr-extract --allow-build=node-pty --allow-build=protobufjs --allow-build=puppeteer --allow-build=sharp --allow-build=unix-dgram --allow-build=workerd $(
            for dep in $WORKSPACE_DEPS; do
