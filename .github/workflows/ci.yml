name: ci
run-name: ${{ github.event.pull_request.title || format('Push to {0}',
  github.ref_name) }} (${{ github.event.pull_request.head.sha || github.sha }})
permissions:
  id-token: write
  contents: read
on:
  push:
    branches:
      - main
  workflow_dispatch: {}
  pull_request: {}
env:
  GITHUB_BRANCH_NAME: ${{ github.head_ref || github.ref_name }}
  CI: 'true'
jobs:
  source-policy:
    runs-on: ubuntu-24.04
    permissions:
      contents: read
    defaults:
      run:
        shell: bash
    env:
      CI: 'true'
      GITHUB_TOKEN: ${{ github.token }}
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/setup-pnpm
      - name: Check first-party default refs
        run: pnpm run source-policy
  lint:
    runs-on: ubuntu-24.04
    defaults:
      run:
        shell: bash
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/setup-pnpm
      - name: Run lint checks
        run: pnpm run lint:full
  changeset-check:
    runs-on: ubuntu-24.04
    if: github.event_name == 'pull_request'
    defaults:
      run:
        shell: bash
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/setup-pnpm
      - name: Fetch changeset comparison base
        run: git fetch origin "${{ github.base_ref }}" --depth=1
      - name: Check release intent
        run: pnpm run release:changeset:check-pr
        env:
          CHANGESET_BASE_REF: origin/${{ github.base_ref }}
      - name: Check changeset bodies
        run: pnpm run release:changeset:check-bodies
  ruleset-drift-check:
    runs-on: ubuntu-24.04
    if: (github.event_name == 'workflow_dispatch' && !startsWith(github.ref_name,
      'automation/release-')) || github.ref == 'refs/heads/main'
    defaults:
      run:
        shell: bash
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/setup-pnpm
      - name: Check repository ruleset drift
        run: pnpm run github:rulesets:check
        env:
          GH_TOKEN: ${{ secrets.LIVESTORE_RULESET_ADMIN_TOKEN || github.token }}
  type-check:
    runs-on: ubuntu-24.04
    defaults:
      run:
        shell: bash
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/setup-pnpm
      - name: Run type-check
        run: pnpm run ts:build
  test-unit:
    runs-on: ubuntu-24.04
    defaults:
      run:
        shell: bash
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/setup-pnpm
      - name: Run unit tests
        run: pnpm run test:unit
  test-integration-sync-provider:
    strategy:
      matrix:
        provider:
          - mock
          - cf-http-d1
          - cf-http-do
          - cf-ws-d1
          - cf-ws-do
          - cf-do-rpc-d1
          - cf-do-rpc-do
    runs-on: ubuntu-24.04
    defaults:
      run:
        shell: bash
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/setup-pnpm
      - name: Set OTEL_EXPORTER_OTLP_HEADERS environment variable
        env:
          GRAFANA_CLOUD_OTLP_INSTANCE_ID: '1227256'
          GRAFANA_CLOUD_OTLP_API_KEY: ${{ secrets.GRAFANA_CLOUD_OTLP_API_KEY }}
        run: |
          echo "OTEL_EXPORTER_OTLP_HEADERS=Authorization=Basic $(echo -n "$GRAFANA_CLOUD_OTLP_INSTANCE_ID:$GRAFANA_CLOUD_OTLP_API_KEY" | base64 -w 0)" >> $GITHUB_ENV
          echo "GRAFANA_ENDPOINT=https://livestore.grafana.net" >> $GITHUB_ENV
          echo "OTEL_EXPORTER_OTLP_ENDPOINT=https://otlp-gateway-prod-us-east-2.grafana.net/otlp" >> $GITHUB_ENV
          # Disable in Vite (otherwise CORS issues)
          echo "VITE_OTEL_EXPORTER_OTLP_ENDPOINT=" >> $GITHUB_ENV
      - name: Run sync-provider tests for ${{ matrix.provider }}
        run: pnpm --dir tests/sync-provider run test:${{ matrix.provider }}
        env:
          OTEL_STATE_DIR: ''
  test-integration-playwright:
    strategy:
      matrix:
        suite:
          - misc
          - todomvc
          - devtools
    runs-on: ubuntu-24.04
    defaults:
      run:
        shell: bash
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/setup-pnpm
        with:
          playwright: 'true'
      - name: Set OTEL_EXPORTER_OTLP_HEADERS environment variable
        env:
          GRAFANA_CLOUD_OTLP_INSTANCE_ID: '1227256'
          GRAFANA_CLOUD_OTLP_API_KEY: ${{ secrets.GRAFANA_CLOUD_OTLP_API_KEY }}
        run: |
          echo "OTEL_EXPORTER_OTLP_HEADERS=Authorization=Basic $(echo -n "$GRAFANA_CLOUD_OTLP_INSTANCE_ID:$GRAFANA_CLOUD_OTLP_API_KEY" | base64 -w 0)" >> $GITHUB_ENV
          echo "GRAFANA_ENDPOINT=https://livestore.grafana.net" >> $GITHUB_ENV
          echo "OTEL_EXPORTER_OTLP_ENDPOINT=https://otlp-gateway-prod-us-east-2.grafana.net/otlp" >> $GITHUB_ENV
          # Disable in Vite (otherwise CORS issues)
          echo "VITE_OTEL_EXPORTER_OTLP_ENDPOINT=" >> $GITHUB_ENV
      - name: Run integration tests
        id: integration_tests
        continue-on-error: ${{ matrix.suite == 'devtools' }}
        run: pnpm run test:integration:playwright --project=${{ matrix.suite }}
      - name: Report tolerated devtools failure
        if: ${{ matrix.suite == 'devtools' && steps.integration_tests.outcome == 'failure' }}
        run: echo "::warning::Devtools Playwright suite failed but is currently allowed to fail while it is stabilized."
      - uses: actions/upload-artifact@v4
        if: ${{ !cancelled() }}
        with:
          name: playwright-report-${{ matrix.suite }}
          path: tests/integration/playwright-report/
          retention-days: 30
      - name: Upload trace
        if: ${{ !cancelled() }}
        env:
          NETLIFY_AUTH_TOKEN: ${{ secrets.NETLIFY_AUTH_TOKEN }}
        run: pnpm run test:integration:playwright:upload-trace ${{ matrix.suite }}
  perf-test:
    runs-on: ubuntu-24.04
    defaults:
      run:
        shell: bash
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha || github.sha }}
      - uses: ./.github/actions/setup-pnpm
        with:
          playwright: 'true'
      - name: Set OTEL_EXPORTER_OTLP_HEADERS environment variable
        env:
          GRAFANA_CLOUD_OTLP_INSTANCE_ID: '1227256'
          GRAFANA_CLOUD_OTLP_API_KEY: ${{ secrets.GRAFANA_CLOUD_OTLP_API_KEY }}
        run: |
          echo "OTEL_EXPORTER_OTLP_HEADERS=Authorization=Basic $(echo -n "$GRAFANA_CLOUD_OTLP_INSTANCE_ID:$GRAFANA_CLOUD_OTLP_API_KEY" | base64 -w 0)" >> $GITHUB_ENV
          echo "GRAFANA_ENDPOINT=https://livestore.grafana.net" >> $GITHUB_ENV
          echo "OTEL_EXPORTER_OTLP_ENDPOINT=https://otlp-gateway-prod-us-east-2.grafana.net/otlp" >> $GITHUB_ENV
          # Disable in Vite (otherwise CORS issues)
          echo "VITE_OTEL_EXPORTER_OTLP_ENDPOINT=" >> $GITHUB_ENV
      - name: Run performance tests
        run: pnpm run test:perf
        env:
          COMMIT_SHA: ${{ github.event.pull_request.head.sha || github.sha }}
          GRAFANA_ENDPOINT: https://livestore.grafana.net
          OTEL_EXPORTER_OTLP_ENDPOINT: https://otlp-gateway-prod-us-east-2.grafana.net/otlp
  wa-sqlite-test:
    runs-on: ubuntu-24.04
    defaults:
      run:
        shell: bash
    steps:
      - uses: actions/checkout@v6
      - name: Install Nix
        uses: DeterminateSystems/determinate-nix-action@v3
        with:
          extra-conf: |
            experimental-features = nix-command flakes
            accept-flake-config = true
            access-tokens = github.com=${{ github.token }}
          summarize: true
      - uses: ./.github/actions/setup-pnpm
        with:
          playwright: 'true'
      - name: Set OTEL_EXPORTER_OTLP_HEADERS environment variable
        env:
          GRAFANA_CLOUD_OTLP_INSTANCE_ID: '1227256'
          GRAFANA_CLOUD_OTLP_API_KEY: ${{ secrets.GRAFANA_CLOUD_OTLP_API_KEY }}
        run: |
          echo "OTEL_EXPORTER_OTLP_HEADERS=Authorization=Basic $(echo -n "$GRAFANA_CLOUD_OTLP_INSTANCE_ID:$GRAFANA_CLOUD_OTLP_API_KEY" | base64 -w 0)" >> $GITHUB_ENV
          echo "GRAFANA_ENDPOINT=https://livestore.grafana.net" >> $GITHUB_ENV
          echo "OTEL_EXPORTER_OTLP_ENDPOINT=https://otlp-gateway-prod-us-east-2.grafana.net/otlp" >> $GITHUB_ENV
          # Disable in Vite (otherwise CORS issues)
          echo "VITE_OTEL_EXPORTER_OTLP_ENDPOINT=" >> $GITHUB_ENV
      - name: Build wa-sqlite
        run: pnpm run test:integration:wa-sqlite:build
      - name: Run wa-sqlite tests
        run: pnpm run test:integration:wa-sqlite
        env:
          COMMIT_SHA: ${{ github.event.pull_request.head.sha || github.sha }}
          GRAFANA_ENDPOINT: https://livestore.grafana.net
          OTEL_EXPORTER_OTLP_ENDPOINT: https://otlp-gateway-prod-us-east-2.grafana.net/otlp
  build-and-deploy-examples-src:
    runs-on: ubuntu-24.04
    defaults:
      run:
        shell: bash
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/setup-pnpm
        with:
          playwright: 'true'
      - name: Install examples dependencies
        run: pnpm run examples:install
      - name: Build examples
        run: pnpm run examples:build:src
      - name: Test examples
        run: pnpm run examples:test
      - id: deploy-examples
        name: Deploy examples to Cloudflare
        if: ${{ success() && github.repository == 'livestorejs/livestore' &&
          (github.event_name != 'pull_request' ||
          github.event.pull_request.head.repo.fork != true) }}
        run: pnpm run examples:deploy
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          WORKFLOW_REPORT_OUTPUT_FILE: ${{ runner.temp }}/workflow-reports/examples-deploy.jsonl
      - name: Upload examples deploy workflow report
        if: ${{ github.event_name == 'pull_request' && steps.deploy-examples.outcome ==
          'success' }}
        uses: actions/upload-artifact@v4
        with:
          name: examples-deploy-workflow-report
          path: ${{ runner.temp }}/workflow-reports/examples-deploy.jsonl
          if-no-files-found: warn
          retention-days: 14
      - name: Validate hosted example links
        if: ${{ success() && steps.deploy-examples.outcome == 'success' }}
        run: pnpm run examples:validate-links
  build-deploy-docs:
    runs-on: ubuntu-24.04
    defaults:
      run:
        shell: bash
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/setup-pnpm
        with:
          playwright: 'true'
      - name: Build docs snippets
        run: pnpm run docs:build:phase:snippets
      - name: Build docs diagrams
        run: pnpm run docs:build:phase:diagrams
      - name: Build Astro docs bundle
        run: pnpm run docs:build:phase:astro
      - name: Collect docs build diagnostics on failure
        if: ${{ failure() }}
        run: pnpm run docs:build:diagnostics
      - name: Upload docs build logs
        if: ${{ always() }}
        uses: actions/upload-artifact@v4
        with:
          name: docs-build-logs
          path: tmp/ci-docs/
          retention-days: 14
      - id: deploy-docs
        name: Deploy docs
        if: ${{ success() && github.repository == 'livestorejs/livestore' &&
          (github.event_name != 'pull_request' ||
          github.event.pull_request.head.repo.fork != true) }}
        run: pnpm run docs:deploy
        env:
          NETLIFY_AUTH_TOKEN: ${{ secrets.NETLIFY_AUTH_TOKEN }}
          WORKFLOW_REPORT_OUTPUT_FILE: ${{ runner.temp }}/workflow-reports/docs-deploy.jsonl
      - name: Upload docs deploy workflow report
        if: ${{ github.event_name == 'pull_request' && steps.deploy-docs.outcome ==
          'success' }}
        uses: actions/upload-artifact@v4
        with:
          name: docs-deploy-workflow-report
          path: ${{ runner.temp }}/workflow-reports/docs-deploy.jsonl
          if-no-files-found: warn
          retention-days: 14
