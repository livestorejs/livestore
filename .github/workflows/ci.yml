  build-example-create:
    if: github.event.pull_request.head.repo.fork != true
    needs: publish-snapshot-version
    strategy:
      matrix:
        app: [web-todomvc, web-linearlite, expo-linearlite]
    runs-on:
      [namespace-profile-linux-x86-64, "namespace-features:github.run-id=${{ github.run_id }}"]
    env:
      APP_PATH: "examples/${{ matrix.app }}"
      SNAPSHOT_VERSION: "0.0.0-snapshot-${{ github.sha }}"
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: latest
          standalone: true
      - name: Get app's workspace @livestore dependencies
        run: |
          DEPS=$(jq -r '[(.dependencies // {}), (.devDependencies // {}) | to_entries[] | select(.key | startswith("@livestore/")) | .key] | .[]' ${{ env.APP_PATH }}/package.json | while read dep; do dir="packages/@livestore/${dep#@livestore/}"; [ -d "$dir" ] && echo "$dep"; done | tr '\n' ' ')
          echo "WORKSPACE_DEPS=$DEPS" >> $GITHUB_ENV
      - name: Copy example app
        run: "pnpm dlx @livestore/cli@${{ env.SNAPSHOT_VERSION }} create --example ${{ matrix.app }} --ref ${{ github.ref }} ${{ runner.temp }}/${{ env.APP_PATH }}"
      - name: Use snapshot version of workspace dependencies
        working-directory: "${{ runner.temp }}/${{ env.APP_PATH }}"
        run: |
          pnpm add $(
            for dep in $WORKSPACE_DEPS; do
              echo "$dep@${{ env.SNAPSHOT_VERSION }}"
            done
          )
      - if: "${{ matrix.app != 'expo-linearlite' }}"
        working-directory: "${{ runner.temp }}/${{ env.APP_PATH }}"
        run: pnpm build
