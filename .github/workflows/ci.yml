          else
            echo "::warning::Nix store validation failed, collecting diagnostics and repairing..."
            if ! nix-store --verify --check-contents > "$verify_log" 2>&1; then
              echo "::warning::nix-store --verify --check-contents reported issues (see diagnostics artifact)"
            fi
            if ! nix-store --verify --check-contents --repair > "$repair_log" 2>&1; then
              echo "::warning::nix-store --verify --check-contents --repair reported issues (see diagnostics artifact)"
            fi
            rm -rf ~/.cache/nix/eval-cache-*
            DEVENV_OUT=$(resolve_devenv 2>"$post_resolve_log")
            DEVENV_BIN="$DEVENV_OUT/bin/devenv"
            NIX_CONFIG="$NIX_CONFIG_WITH_UNRESTRICTED_EVAL" "$DEVENV_BIN" info > "$post_info_log" 2>&1
          fi

          echo "DEVENV_BIN=$DEVENV_BIN" >> "$GITHUB_ENV"
          "$DEVENV_BIN" version | tee "$DIAG_ROOT/devenv-version.txt"
        shell: bash
      - name: Build docs snippets
        run: "if [ -n \"${NIX_CONFIG:-}\" ]; then NIX_CONFIG_WITH_UNRESTRICTED_EVAL=\"$NIX_CONFIG\"$'\\n''restrict-eval = false'; else NIX_CONFIG_WITH_UNRESTRICTED_EVAL='restrict-eval = false'; fi; NIX_CONFIG=\"$NIX_CONFIG_WITH_UNRESTRICTED_EVAL\" \"${DEVENV_BIN:?DEVENV_BIN not set}\" tasks run docs:build:phase:snippets --mode before"
      - name: Build docs diagrams
        run: "if [ -n \"${NIX_CONFIG:-}\" ]; then NIX_CONFIG_WITH_UNRESTRICTED_EVAL=\"$NIX_CONFIG\"$'\\n''restrict-eval = false'; else NIX_CONFIG_WITH_UNRESTRICTED_EVAL='restrict-eval = false'; fi; NIX_CONFIG=\"$NIX_CONFIG_WITH_UNRESTRICTED_EVAL\" \"${DEVENV_BIN:?DEVENV_BIN not set}\" tasks run docs:build:phase:diagrams --mode before"
      - name: Build Astro docs bundle
        run: "if [ -n \"${NIX_CONFIG:-}\" ]; then NIX_CONFIG_WITH_UNRESTRICTED_EVAL=\"$NIX_CONFIG\"$'\\n''restrict-eval = false'; else NIX_CONFIG_WITH_UNRESTRICTED_EVAL='restrict-eval = false'; fi; NIX_CONFIG=\"$NIX_CONFIG_WITH_UNRESTRICTED_EVAL\" \"${DEVENV_BIN:?DEVENV_BIN not set}\" tasks run docs:build:phase:astro --mode before"
      - name: Collect docs build diagnostics on failure
        if: '${{ failure() }}'
        run: "if [ -n \"${NIX_CONFIG:-}\" ]; then NIX_CONFIG_WITH_UNRESTRICTED_EVAL=\"$NIX_CONFIG\"$'\\n''restrict-eval = false'; else NIX_CONFIG_WITH_UNRESTRICTED_EVAL='restrict-eval = false'; fi; NIX_CONFIG=\"$NIX_CONFIG_WITH_UNRESTRICTED_EVAL\" \"${DEVENV_BIN:?DEVENV_BIN not set}\" tasks run docs:build:diagnostics --mode before"
      - name: Upload docs build logs
        if: '${{ always() }}'
        uses: actions/upload-artifact@v4
        with:
          name: docs-build-logs
          path: tmp/ci-docs/
          retention-days: 14
      - name: Deploy docs
        if: "${{ success() && (github.event_name != 'pull_request' || github.event.pull_request.head.repo.fork != true) }}"
        run: "if [ -n \"${NIX_CONFIG:-}\" ]; then NIX_CONFIG_WITH_UNRESTRICTED_EVAL=\"$NIX_CONFIG\"$'\\n''restrict-eval = false'; else NIX_CONFIG_WITH_UNRESTRICTED_EVAL='restrict-eval = false'; fi; NIX_CONFIG=\"$NIX_CONFIG_WITH_UNRESTRICTED_EVAL\" \"${DEVENV_BIN:?DEVENV_BIN not set}\" tasks run docs:deploy --mode before"
        env:
          NETLIFY_AUTH_TOKEN: '${{ secrets.NETLIFY_AUTH_TOKEN }}'
  build-example-create:
    if: github.event.pull_request.head.repo.fork != true
    needs: publish-snapshot-version
    strategy:
      matrix:
        app: [web-todomvc, web-linearlite, expo-linearlite]
    runs-on: [namespace-profile-linux-x86-64, 'namespace-features:github.run-id=${{ github.run_id }}']
    env:
      APP_PATH: 'examples/${{ matrix.app }}'
      SNAPSHOT_VERSION: '0.0.0-snapshot-${{ github.sha }}'
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: latest
          standalone: true
      - name: Get app's workspace @livestore dependencies
        run: |
          DEPS=$(jq -r '[(.dependencies // {}), (.devDependencies // {}) | to_entries[] | select(.key | startswith("@livestore/")) | .key] | .[]' ${{ env.APP_PATH }}/package.json | while read dep; do dir="packages/@livestore/${dep#@livestore/}"; [ -d "$dir" ] && echo "$dep"; done | tr '\n' ' ')
          echo "WORKSPACE_DEPS=$DEPS" >> $GITHUB_ENV
      - name: Copy example app
        run: 'pnpm dlx @livestore/cli@${{ env.SNAPSHOT_VERSION }} create --example ${{ matrix.app }} --ref ${{ github.ref }} ${{ runner.temp }}/${{ env.APP_PATH }}'
      - name: Use snapshot version of workspace dependencies
        working-directory: '${{ runner.temp }}/${{ env.APP_PATH }}'
        run: |
          pnpm add $(
            for dep in $WORKSPACE_DEPS; do
              echo "$dep@${{ env.SNAPSHOT_VERSION }}"
            done
          )
      - if: "${{ matrix.app != 'expo-linearlite' }}"
        working-directory: '${{ runner.temp }}/${{ env.APP_PATH }}'
        run: pnpm build
