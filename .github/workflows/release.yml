name: Release
on:
  workflow_dispatch:
    inputs:
      npm_tag:
        description: npm dist-tag for the release
        required: true
        default: latest
        type: string
      mode:
        description: Release workflow mode
        required: true
        default: create-release-pr
        type: choice
        options:
          - create-release-pr
          - validate-release-plan
          - publish-release
          - publish-snapshot
  workflow_run:
    workflows:
      - ci
    types:
      - completed
    branches:
      - main
  pull_request:
    paths:
      - .github/workflows/release.yml
      - .github/workflows/deploy-prod.yml
      - release/release-plan.json
      - release/release-notes.md
      - release/version.json
      - release/devtools-artifact.json
      - scripts/src/commands/release.ts
      - scripts/src/commands/devtools-artifact.ts
      - scripts/src/commands/changesets.ts
      - scripts/src/commands/docs.ts
      - scripts/src/shared/netlify.ts
  push:
    branches:
      - main
    paths:
      - release/release-plan.json
permissions:
  contents: read
  id-token: write
env:
  CI: 'true'
jobs:
  source-policy:
    runs-on: ubuntu-24.04
    permissions:
      contents: read
    defaults:
      run:
        shell: bash
    env:
      CI: 'true'
      GITHUB_TOKEN: ${{ github.token }}
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/setup-pnpm
      - name: Check first-party default refs
        env:
          FIRST_PARTY_OWNERS_JSON: '["overengineeringstudio"]'
          DEFAULT_REF: main
          VERIFY_REACHABLE: '1'
        run: pnpm run source-policy
  create-release-pr:
    if: github.event_name == 'workflow_dispatch' && inputs.mode == 'create-release-pr'
    runs-on: ubuntu-latest
    permissions:
      actions: write
      contents: write
      id-token: write
      pull-requests: write
    defaults:
      run:
        shell: bash
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: main
      - uses: ./.github/actions/setup-pnpm
      - name: Generate release plan from Changesets
        run: pnpm run release:changeset:version
        env:
          LIVESTORE_NPM_TAG: ${{ inputs.npm_tag }}
      - name: Extract release notes
        run: pnpm run release:notes:extract
      - name: Open release plan PR
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          LIVESTORE_NPM_TAG: ${{ inputs.npm_tag }}
        run: |
          set -euo pipefail

          LIVESTORE_RELEASE_VERSION="$(jq -r '.version' release/release-plan.json)"

          : "${LIVESTORE_RELEASE_VERSION:?Missing generated release version}"

          : "${LIVESTORE_NPM_TAG:?Missing npm tag}"


          git config user.name "github-actions[bot]"

          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"


          branch="automation/release-$LIVESTORE_RELEASE_VERSION"

          git checkout -B "$branch"

          git add \
            .changeset \
            package.json \
            pnpm-lock.yaml \
            release/devtools-artifact.json \
            release/release-notes.md \
            release/release-plan.json \
            release/version.json \
            docs/package.json \
            docs/src/content/_assets/code/package.json \
            examples \
            packages \
            tests

          if git diff --cached --quiet; then
            echo "Release plan already current."
          else
            git commit -m "Prepare LiveStore $LIVESTORE_RELEASE_VERSION release"
            git fetch origin "refs/heads/$branch:refs/remotes/origin/$branch" || true
            git push --force-with-lease="refs/heads/$branch" origin "$branch"
          fi


          body="$(cat <<BODY
          Prepares a LiveStore release group for $LIVESTORE_RELEASE_VERSION from
          the pending Changesets.


          The release workflow dry-runs the npm publish for the LiveStore
          packages and the public DevTools artifact repack on this PR. After
          merge into main, the same workflow publishes the release group. The
          publish job can also be manually dispatched after an operator verifies
          that the checked-in release plan is still the intended release.


          ## Rationale


          Release cutting is represented as a reviewable data change instead of
          a local operator action. Changesets provide the release intent and
          fixed-group version calculation; LiveStore's existing publisher
          remains responsible for package provenance and DevTools artifact
          repacking.
          BODY
          )"


          if gh pr view "$branch" --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1; then
            gh pr edit "$branch" --repo "$GITHUB_REPOSITORY" --title "Prepare LiveStore $LIVESTORE_RELEASE_VERSION release" --body "$body"
          else
            gh pr create \
              --repo "$GITHUB_REPOSITORY" \
              --base main \
              --head "$branch" \
              --title "Prepare LiveStore $LIVESTORE_RELEASE_VERSION release" \
              --body "$body"
          fi


          gh workflow run ci.yml --repo "$GITHUB_REPOSITORY" --ref "$branch"

          gh workflow run release.yml --repo "$GITHUB_REPOSITORY" --ref "$branch" \
            -f mode=validate-release-plan \
            -f npm_tag="$LIVESTORE_NPM_TAG"

          # Stable (npm_tag=latest) release PRs are gated by a human reviewer.
          # For prerelease channels (dev, next, etc.) the release PR is fully
          # automated, so auto-merge is enabled to drive the publish on green CI.

          if [ "$LIVESTORE_NPM_TAG" = "latest" ]; then
            echo "npm_tag=latest: leaving auto-merge disabled; this PR requires a human ready-for-review and merge."
          elif gh pr view "$branch" --repo "$GITHUB_REPOSITORY" --json autoMergeRequest --jq '.autoMergeRequest != null' | grep -qx true; then
            echo "Auto-merge already enabled for $branch."
          else
            gh pr merge "$branch" --repo "$GITHUB_REPOSITORY" --auto --merge
          fi
  validate-release-plan:
    if: github.event_name == 'pull_request' || (github.event_name == 'workflow_dispatch' && inputs.mode == 'validate-release-plan')
    runs-on: ubuntu-24.04
    defaults:
      run:
        shell: bash
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/setup-pnpm
        with:
          playwright: 'true'
      - name: Select release plan for validation
        run: |
          set -euo pipefail

          use_synthetic_plan=false


          if [ "$GITHUB_EVENT_NAME" = "pull_request" ]; then
            git fetch origin "${{ github.base_ref }}" --depth=1
            if ! git diff --name-only "origin/${{ github.base_ref }}...HEAD" | grep -qx 'release/release-plan.json'; then
              use_synthetic_plan=true
            fi
          elif [ ! -f release/release-plan.json ]; then
            use_synthetic_plan=true
          fi


          if [ "$use_synthetic_plan" = "false" ]; then
            exit 0
          fi


          mkdir -p release

          # PRs that touch release machinery but do not carry an actual release
          # plan still need to exercise package publishing and DevTools repacking.
          # Use a unique, unpublished prerelease instead of the checked-in package
          # version: current dev versions can already exist on npm, while snapshot
          # versions intentionally belong to the separate snapshot publisher.

          short_sha="${GITHUB_SHA:0:12}"

          version="0.0.0-ci.release-validation.$short_sha"

          npm_tag="next"

          jq -n \
            --arg version "$version" \
            --arg npmTag "$npm_tag" \
            '{
              schemaVersion: 1,
              version: $version,
              npmTag: $npmTag
            }' > release/release-plan.json
      - name: Dry-run stable package publish
        run: pnpm run release:stable:dryrun
      - name: Read release plan
        run: |
          set -euo pipefail
          release_version="$(jq -r '.version' release/release-plan.json)"
          npm_tag="$(jq -r '.npmTag' release/release-plan.json)"
          : "${release_version:?Missing release version}"
          : "${npm_tag:?Missing npm tag}"
          echo "LIVESTORE_RELEASE_VERSION=$release_version" >> "$GITHUB_ENV"
          echo "LIVESTORE_NPM_TAG=$npm_tag" >> "$GITHUB_ENV"
          if [ "$npm_tag" = "latest" ]; then
            echo "LIVESTORE_RELEASE_DEPLOY_TARGET=prod" >> "$GITHUB_ENV"
          else
            echo "LIVESTORE_RELEASE_DEPLOY_TARGET=dev" >> "$GITHUB_ENV"
          fi
      - name: Certify DevTools artifact liveness
        run: pnpm run release:devtools-artifact:certify-liveness:no-install
      - uses: actions/upload-artifact@v4
        if: ${{ !cancelled() }}
        with:
          name: devtools-certification-playwright-artifacts-${{ github.job }}
          path: |
            tests/integration/playwright-report/
            tests/integration/test-results/devtools/
          retention-days: 30
          if-no-files-found: ignore
      - name: Dry-run DevTools artifact repack
        run: pnpm run release:devtools-artifact:repack-dryrun:no-install
  publish-release:
    if: github.repository == 'livestorejs/livestore' && (github.event_name == 'push' || (github.event_name == 'workflow_dispatch' && github.ref == 'refs/heads/main' && inputs.mode == 'publish-release'))
    runs-on: ubuntu-24.04
    permissions:
      contents: write
      id-token: write
    env:
      GH_TOKEN: ${{ github.token }}
    defaults:
      run:
        shell: bash
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/setup-pnpm
        with:
          playwright: 'true'
      - name: Read release plan
        run: |
          set -euo pipefail

          release_version="$(jq -r '.version' release/release-plan.json)"

          npm_tag="$(jq -r '.npmTag' release/release-plan.json)"

          : "${release_version:?Missing release version}"

          : "${npm_tag:?Missing npm tag}"

          echo "LIVESTORE_RELEASE_VERSION=$release_version" >> "$GITHUB_ENV"

          echo "LIVESTORE_NPM_TAG=$npm_tag" >> "$GITHUB_ENV"

          # Env vars do not carry across jobs in GitHub Actions, so the
          # deploy-target gate that the validate-release-plan job sets must be
          # re-derived here for the Deploy production docs/examples and Sync
          # production docs search steps below.

          if [ "$npm_tag" = "latest" ]; then
            echo "LIVESTORE_RELEASE_DEPLOY_TARGET=prod" >> "$GITHUB_ENV"
          else
            echo "LIVESTORE_RELEASE_DEPLOY_TARGET=dev" >> "$GITHUB_ENV"
          fi
      - name: Assert tokenless npm trusted publishing
        run: |
          set -euo pipefail

          if [ -n "${NODE_AUTH_TOKEN:-}" ] || [ -n "${NPM_TOKEN:-}" ]; then
            echo "npm publishing must use trusted publishing; token auth is not allowed in this job." >&2
            exit 1
          fi
      - name: Set OTEL_EXPORTER_OTLP_HEADERS environment variable
        env:
          GRAFANA_CLOUD_OTLP_INSTANCE_ID: '1227256'
          GRAFANA_CLOUD_OTLP_API_KEY: ${{ secrets.GRAFANA_CLOUD_OTLP_API_KEY }}
        run: |
          echo "OTEL_EXPORTER_OTLP_HEADERS=Authorization=Basic $(echo -n "$GRAFANA_CLOUD_OTLP_INSTANCE_ID:$GRAFANA_CLOUD_OTLP_API_KEY" | base64 -w 0)" >> $GITHUB_ENV
          echo "GRAFANA_ENDPOINT=https://livestore.grafana.net" >> $GITHUB_ENV
          echo "OTEL_EXPORTER_OTLP_ENDPOINT=https://otlp-gateway-prod-us-east-2.grafana.net/otlp" >> $GITHUB_ENV
          # Disable in Vite (otherwise CORS issues)
          echo "VITE_OTEL_EXPORTER_OTLP_ENDPOINT=" >> $GITHUB_ENV
      - name: Publish stable package release
        run: pnpm run release:stable:publish
      - name: Certify DevTools artifact liveness
        run: pnpm run release:devtools-artifact:certify-liveness:no-install
      - uses: actions/upload-artifact@v4
        if: ${{ !cancelled() }}
        with:
          name: devtools-certification-playwright-artifacts-${{ github.job }}
          path: |
            tests/integration/playwright-report/
            tests/integration/test-results/devtools/
          retention-days: 30
          if-no-files-found: ignore
      - name: Publish DevTools artifact release
        run: pnpm run release:devtools-artifact:publish:no-install
      - name: Deploy production docs — build + deploy
        if: env.LIVESTORE_RELEASE_DEPLOY_TARGET == 'prod'
        timeout-minutes: 30
        run: pnpm run docs:deploy:prod:phase:build-deploy
        env:
          NETLIFY_AUTH_TOKEN: ${{ secrets.NETLIFY_AUTH_TOKEN }}
      - name: Deploy production docs — verify
        if: env.LIVESTORE_RELEASE_DEPLOY_TARGET == 'prod'
        timeout-minutes: 15
        run: pnpm run docs:deploy:prod:phase:verify
        env:
          NETLIFY_AUTH_TOKEN: ${{ secrets.NETLIFY_AUTH_TOKEN }}
      - name: Deploy production docs — purge CDN
        if: env.LIVESTORE_RELEASE_DEPLOY_TARGET == 'prod'
        timeout-minutes: 15
        run: pnpm run docs:deploy:prod:phase:purge
        env:
          NETLIFY_AUTH_TOKEN: ${{ secrets.NETLIFY_AUTH_TOKEN }}
      - name: Collect docs deploy diagnostics on failure
        if: ${{ failure() && env.LIVESTORE_RELEASE_DEPLOY_TARGET == 'prod' }}
        run: pnpm run docs:deploy:prod:diagnostics
      - name: Upload docs prod deploy logs
        if: ${{ always() && env.LIVESTORE_RELEASE_DEPLOY_TARGET == 'prod' }}
        uses: actions/upload-artifact@v4
        with:
          name: docs-prod-deploy-logs-${{ github.run_id }}-${{ github.run_attempt }}
          path: tmp/ci-docs-prod/
          if-no-files-found: ignore
          retention-days: 14
      - name: Deploy production examples
        if: env.LIVESTORE_RELEASE_DEPLOY_TARGET == 'prod'
        timeout-minutes: 30
        run: pnpm run examples:deploy:prod
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
      - name: Sync production docs search
        if: env.LIVESTORE_RELEASE_DEPLOY_TARGET == 'prod'
        timeout-minutes: 15
        run: pnpm run docs:search:sync:prod
        env:
          MXBAI_API_KEY: ${{ secrets.MXBAI_API_KEY }}
          MXBAI_VECTOR_STORE_ID: ${{ secrets.MXBAI_VECTOR_STORE_ID }}
  publish-snapshot-version:
    if: github.repository == 'livestorejs/livestore' && ((github.event_name == 'workflow_run' && github.event.workflow_run.conclusion == 'success' && github.event.workflow_run.event == 'push') || (github.event_name == 'workflow_dispatch' && github.ref == 'refs/heads/main' && inputs.mode == 'publish-snapshot'))
    runs-on: ubuntu-24.04
    permissions:
      contents: write
      id-token: write
    env:
      GH_TOKEN: ${{ github.token }}
    defaults:
      run:
        shell: bash
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha || github.sha }}
      - uses: ./.github/actions/setup-pnpm
        with:
          playwright: 'true'
      - name: Assert tokenless npm trusted publishing
        run: |
          set -euo pipefail

          if [ -n "${NODE_AUTH_TOKEN:-}" ] || [ -n "${NPM_TOKEN:-}" ]; then
            echo "npm snapshot publishing must use trusted publishing; token auth is not allowed in this job." >&2
            exit 1
          fi
      - name: Publish snapshot version
        run: pnpm run release:snapshot:git-sha
        env:
          GIT_SHA: ${{ github.event.workflow_run.head_sha || github.sha }}
      - name: Publish DevTools artifact snapshot
        run: pnpm run release:devtools-artifact:publish
        env:
          LIVESTORE_DEVTOOLS_OUT_DIR: ${{ runner.temp }}/livestore-devtools-snapshot
          LIVESTORE_RELEASE_VERSION: 0.0.0-snapshot-${{ github.event.workflow_run.head_sha || github.sha }}
      - name: Upload DevTools Chrome snapshot artifact
        uses: actions/upload-artifact@v4
        with:
          name: livestore-devtools-chrome-0.0.0-snapshot-${{ github.event.workflow_run.head_sha || github.sha }}
          path: ${{ runner.temp }}/livestore-devtools-snapshot/livestore-devtools-chrome-0.0.0-snapshot-${{ github.event.workflow_run.head_sha || github.sha }}.zip
          if-no-files-found: error
          retention-days: 14
