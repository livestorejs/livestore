              [[ "$candidate_run_id" =~ ^[1-9][0-9]*$ ]]
              jobs_json=$(gh api --paginate "/repos/$GITHUB_REPOSITORY/actions/runs/$candidate_run_id/jobs?filter=all&per_page=100" --slurp)
