name: Publish Fourbytwo fork packages

on:
  workflow_dispatch:
    inputs:
      version:
        description: Optional package version. Defaults to <livestore version>.fourbytwo.<short sha>.
        required: false
        type: string
      tag:
        description: npm dist-tag to attach to the published fork packages.
        required: true
        default: fourbytwo
        type: string
      dry_run:
        description: Prepare and dry-run npm publish without uploading packages.
        required: true
        default: false
        type: boolean

permissions:
  contents: read
  packages: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 11.0.0-rc.5

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          registry-url: https://npm.pkg.github.com
          scope: "@raymonddaikon"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile --ignore-scripts

      - name: Build dist artifacts
        run: pnpm --package=typescript@5.9.3 dlx tsc --build tsconfig.dev.json --noCheck

      - name: Publish staged fork packages
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          FORK_NPM_SCOPE: "@raymonddaikon"
          FORK_NPM_REGISTRY: https://npm.pkg.github.com
          FORK_NPM_TAG: ${{ inputs.tag }}
          FORK_PACKAGE_VERSION: ${{ inputs.version }}
        run: |
          args=(--publish)
          if [ "${{ inputs.dry_run }}" = "true" ]; then
            args=(--dry-run)
          fi
          node scripts/publish-fourbytwo-fork-packages.mjs "${args[@]}"
