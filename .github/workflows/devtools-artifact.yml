          const roots = [cwd]
          const reposRoot = path.join(cwd, 'repos')
          if (fs.existsSync(reposRoot)) {
            for (const entry of fs.readdirSync(reposRoot)) {
              roots.push(path.join(reposRoot, entry))
            }
