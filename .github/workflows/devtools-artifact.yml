            ${{ github.workspace }}/.pnpm-home
            ${{ runner.temp }}/pnpm-store/${{ github.job }}
          key: "livestore-pnpm-state-v1-${{ runner.os }}-${{ runner.arch }}-${{ hashFiles('**/pnpm-lock.yaml') }}"
