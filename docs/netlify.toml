# Netlify configuration for docs deployment
#
# IMPORTANT: Netlify CLI resolves config paths (publish, edge_functions) relative
# to the git repository root, not relative to this file.
#
# Deploy model ("Option A"): the deploy runs the full `@netlify/build` pipeline
# via `netlify deploy --build --filter @local/docs` from the git root on our own
# runner. `--build` invokes `@netlify/build`, which runs the `[build] command`
# below and bundles BOTH the serverless SSR function and the edge function — no
# manual `--dir`/`--functions` flags. See `scripts/src/shared/netlify.ts`.

[images]
# Allow image transformations from gitbucket.schickling.dev
# This is needed for example screenshots to display properly in production
# The domain is double-escaped as required by Netlify's regex configuration
remote_images = ["https://gitbucket\\.schickling\\.dev/.*"]

# Build & publish
#
# The command runs from the git root (Netlify resolves it relative to the repo
# root), so it must `cd docs` first. `publish` is likewise git-root-relative.
#   - NODE_ENV=production: the `@astrojs/netlify` adapter only engages in prod.
#   - DT_PASSTHROUGH=1: the agent-policy wrapper blocks pnpm/astro inside
#     Netlify's spawned build subprocess; this lets `bunx astro` through.
[build]
command = "cd docs && NODE_ENV=production DT_PASSTHROUGH=1 bunx astro build"
publish = "docs/dist"
# Path relative to git root (Netlify CLI resolves from repo root, not this file)
edge_functions = "docs/netlify/edge-functions"

# Edge Function configuration. The Edge runtime bundles the file(s) below and
# attaches them at the CDN layer during the Netlify deploy phase.

[[edge_functions]]
function = "markdown-negotiation"
path = "/*"
